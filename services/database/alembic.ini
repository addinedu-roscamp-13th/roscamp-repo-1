# Alembic 설정 — Automato DB
# 실제 DB 접속 URL(sqlalchemy.url)은 여기 하드코딩하지 않고,
# alembic/env.py 가 .env 의 DATABASE_URL 을 읽어 주입한다.
[alembic]
script_location = alembic
prepend_sys_path = .
# 마이그레이션 파일명 규칙: 0001_xxx.py 처럼 번호 프리픽스 유지
# (revision id 는 각 파일 상단에서 직접 지정)

# sqlalchemy.url 은 env.py 에서 동적으로 설정됨 (아래 값은 폴백/문서용)
sqlalchemy.url = postgresql+psycopg://automato:automato@localhost:5432/automato

# --- 로깅 ---
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
